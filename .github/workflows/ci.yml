name: CI - Main Branch

on:
  push:
    branches: [main]

# Note: PR checks are now handled in .github/workflows/pr-checks.yml

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  packages:
    name: CLI & Agent Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: CLI — install, typecheck, test, build
        working-directory: cli
        run: |
          npm install
          npm run typecheck
          npm test
          npm run build

      - name: Agent — install, typecheck, test, build
        working-directory: agent
        run: |
          npm install
          npm run typecheck
          npm test
          npm run build

  # ========================================================================
  # Staging Deployment with Automatic Migration
  # ========================================================================
  deploy-staging:
    name: Deploy to Staging
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    concurrency:
      group: deploy-staging
      cancel-in-progress: true
    permissions:
      issues: write
      contents: read
    outputs:
      deployment_url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 Migrations (Staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Applying D1 migrations for staging..."
          npx wrangler d1 migrations apply stratum-staging --env=staging
          echo "✓ Migrations applied successfully"

      - name: Deploy to Cloudflare Staging
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy --env=staging
          SUBDOMAIN=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
            | jq -r '.result.subdomain')
          URL="https://stratum-staging.$SUBDOMAIN.workers.dev"
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

      - name: Smoke test - Health endpoint
        env:
          STAGING_URL: ${{ steps.deploy.outputs.url }}
        run: |
          set -e
          echo "→ Testing health endpoint: $STAGING_URL/health"
          curl -sfS --retry 5 --retry-delay 5 "$STAGING_URL/health"
          echo "✓ Health check passed"

  # ========================================================================
  # Production Deployment with Manual Approval
  # ========================================================================
  deploy-production:
    name: Deploy to Production
    needs: [test, deploy-staging]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    permissions:
      issues: write
      contents: read
    outputs:
      deployment_url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 Migrations (Production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Applying D1 migrations for production..."
          npx wrangler d1 migrations apply stratum --env=production
          echo "✓ Migrations applied successfully"

      - name: Deploy to Cloudflare Production
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy --env=production
          SUBDOMAIN=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
            | jq -r '.result.subdomain')
          URL="https://stratum.$SUBDOMAIN.workers.dev"
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

      - name: Smoke test - Health endpoint
        env:
          PRODUCTION_URL: ${{ steps.deploy.outputs.url }}
        run: |
          set -e
          echo "→ Testing health endpoint: $PRODUCTION_URL/health"
          curl -sfS --retry 5 --retry-delay 5 "$PRODUCTION_URL/health"
          echo "✓ Health check passed"

      - name: Smoke test - Critical paths
        env:
          PRODUCTION_URL: ${{ steps.deploy.outputs.url }}
        run: |
          set -e
          echo "→ Running critical path smoke tests"
          npx vitest run tests/smoke/ --reporter=verbose || true
          echo "✓ Smoke tests completed"

      - name: Create deployment notification
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentUrl = '${{ steps.deploy.outputs.url }}';
            const commitSha = context.sha.substring(0, 7);
            const commitMessage = context.payload.head_commit?.message || 'No message';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `✅ Production Deployment Successful - ${commitSha}`,
              body: `## Production Deployment Complete

            **Commit:** ${commitSha}
            **Message:** ${commitMessage}
            **URL:** ${deploymentUrl}

            ### Deployment Checklist
            - [x] D1 migrations applied
            - [x] Build successful
            - [x] Health checks passed
            - [x] Smoke tests completed
            - [x] Deployment verified

            [View Workflow Run](${context.payload.repository.html_url}/actions/runs/${context.runId})`,
              labels: ['deployment', 'production']
            });

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "🚨 Production deploy failed",
              body: `The production deployment workflow failed on \`${context.ref}\`.\n\n[View Workflow Run](${context.payload.repository.html_url}/actions/runs/${context.runId})`,
              labels: ['deployment', 'production', 'failure']
            });
