name: D1 Migrate

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to migrate"
        required: true
        type: choice
        options:
          - staging
          - production
      database_name:
        description: "D1 database name (defaults: stratum for production, stratum-staging for staging)"
        required: false
        type: string

jobs:
  migrate:
    name: Apply D1 Migrations
    runs-on: ubuntu-latest
    concurrency:
      group: migrate-${{ github.event.inputs.environment }}
      cancel-in-progress: false
    permissions:
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Apply migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ENV="${{ github.event.inputs.environment }}"
          DB_NAME="${{ github.event.inputs.database_name }}"

          if [ -z "$DB_NAME" ]; then
            if [ "$ENV" = "production" ]; then
              DB_NAME="stratum"
            else
              DB_NAME="stratum-staging"
            fi
          fi

          echo "Applying migrations for environment=$ENV database=$DB_NAME"
          npx wrangler d1 migrations apply "$DB_NAME" --remote --env="$ENV"

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "🚨 D1 migration failed on ${{ github.event.inputs.environment }}",
              body: `The D1 migration workflow failed for the \`${{ github.event.inputs.environment }}\` environment.\n\n[View run](${context.payload.repository.html_url}/actions/runs/${context.runId})`
            });
