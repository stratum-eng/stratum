openapi: 3.1.0
info:
  title: Stratum API
  description: A code collaboration platform for the AI engineering era
  version: 1.0.0

servers:
  - url: https://your-instance.workers.dev
    description: Production

paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK

  /api/projects:
    get:
      summary: List projects
      responses:
        '200':
          description: List of projects
    post:
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Project created

  /api/projects/{namespace}/{slug}:
    delete:
      summary: Delete project (owner-only, cascading, async)
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirm]
              properties:
                confirm:
                  type: string
                  description: Must exactly equal "@namespace/slug".
      responses:
        '202':
          description: Deletion enqueued
          content:
            application/json:
              schema:
                type: object
                required: [status, jobId]
                properties:
                  status:
                    type: string
                    example: deleting
                  jobId:
                    type: string
                    example: del_abc123
        '400':
          description: Confirmation mismatch
        '404':
          description: Not found or not the owner

  /api/users/me:
    delete:
      summary: Delete account (GDPR erasure, self-only, async)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirm]
              properties:
                confirm:
                  type: string
                  description: Must exactly equal the caller's username.
      responses:
        '202':
          description: Erasure enqueued (jobId returned); credentials invalidated immediately
          content:
            application/json:
              schema:
                type: object
                required: [status, jobId]
                properties:
                  status:
                    type: string
                    example: deleting
                  jobId:
                    type: string
                    example: del_abc123
        '400':
          description: Confirmation mismatch
