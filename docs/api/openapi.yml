openapi: 3.1.0
info:
  title: Stratum API
  description: A code collaboration platform for the AI engineering era
  version: 1.0.0

servers:
  - url: https://stratum.jlmx.workers.dev
    description: Production

paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK

  /api/projects:
    get:
      summary: List projects
      responses:
        '200':
          description: List of projects
    post:
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Project created
