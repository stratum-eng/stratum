# =============================================================================
# Stratum Worker configuration
#
# The TOP-LEVEL config below is a GENERIC self-hosting template. To run your own
# instance: replace the binding ids (KV/D1) with your own, set your domain/OAuth
# values, then `wrangler deploy`.
#
# The maintainer's hosted instance is NOT the default — it lives in
# [env.production] (and [env.staging]) and is deployed with:
#   wrangler deploy --env production
# See .github/workflows/deploy-production.yml and ci.yml.
# =============================================================================

name = "stratum"
main = "src/index.ts"
compatibility_date = "2026-04-29"
compatibility_flags = ["nodejs_compat"]

# Durable Object migrations — defined once, inherited by all environments.
[[migrations]]
tag = "v1"
new_classes = ["MergeQueue"]

# RepoDO: per-repo ref authority (ADR 004, Phase 1). SQLite-backed so it can hold
# the ref + a hot object index. One-way migration; rollback is the REPO_DO_ENABLED
# kill switch, not class removal. Migrations are declared once here and apply to
# every env; only the per-env bindings below differ (script_name).
[[migrations]]
tag = "v2"
new_sqlite_classes = ["RepoDO"]

# Observability - Workers Logs and Traces
[observability]
enabled = true
head_sampling_rate = 1.0

[observability.traces]
enabled = true
head_sampling_rate = 0.1

# --- Bindings: replace the ids with your own Cloudflare resources -------------
[[artifacts]]
binding = "ARTIFACTS"
namespace = "stratum"

[[kv_namespaces]]
binding = "STATE"
id = "0000000000000000000000000000000a"  # replace: wrangler kv namespace create STATE

[[d1_databases]]
binding = "DB"
database_name = "stratum"
database_id = "00000000-0000-0000-0000-00000000000a"  # replace: wrangler d1 create stratum
migrations_dir = "migrations"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "stratum_requests"

# Durable backup store (D1 dumps, KV identity, repo packs). Provision both the
# production and staging buckets:
#   wrangler r2 bucket create stratum-backups
#   wrangler r2 bucket create stratum-backups-staging
[[r2_buckets]]
binding = "BACKUPS"
bucket_name = "stratum-backups"

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "MERGE_QUEUE"
class_name = "MergeQueue"
script_name = "stratum"

[[durable_objects.bindings]]
name = "REPO_DO"
class_name = "RepoDO"
script_name = "stratum"

[[queues.producers]]
binding = "EVENTS_QUEUE"
queue = "stratum-events"

[[queues.producers]]
binding = "IMPORT_QUEUE"
queue = "stratum-imports"

[[queues.consumers]]
queue = "stratum-events"

[[queues.consumers]]
queue = "stratum-imports"
max_batch_size = 1  # Process imports one at a time for resource management
max_retries = 3     # Retry failed imports up to 3 times
retry_delay = 30    # Wait 30 seconds between retries

# "0 6 * * *"   — daily housekeeping: workspace TTL sweep + auto-sync
# "*/5 * * * *" — event outbox sweep: re-enqueue stale pending events
[triggers]
crons = ["0 6 * * *", "*/5 * * * *"]

# Email Sending — configure via: wrangler email sending enable yourdomain.com
[[send_email]]
name = "EMAIL"

# Sandboxes binding — beta feature, only available with Cloudflare Sandboxes access
# [[sandboxes]]
# binding = "SANDBOX"

[vars]
POSTHOG_HOST = "https://app.posthog.com"
# Enables the /dev-login session backdoor for local `wrangler dev` only. Named
# envs do NOT inherit top-level vars, so staging/production (which re-declare
# their own [vars]) leave this unset and the route stays inert there.
DEV_LOGIN_ENABLED = "true"
# RepoDO fast-forward path (ADR 004, Phase 1). Default off: merges take the proven
# cold path. Flip to "true" to enable the fast-forward ref authority (and to run
# the benchmark "after" number). This is the kill switch / rollback.
REPO_DO_ENABLED = "false"
# Set these to your own host when self-hosting (and register the callback URLs
# in your GitHub/Google OAuth apps):
OAUTH_REDIRECT_URI = "http://localhost:8787/auth/github/callback"
# GOOGLE_REDIRECT_URI = "https://your-app.example.com/auth/google/callback"
# Closed-beta gate (hosted-only; leave unset/commented for ungated self-hosting).
# The gate turns ON only when BETA_GATE = "1" AND REFERRAL_SERVICE_URL is set.
# BETA_GATE = "1"
# REFERRAL_SERVICE_URL = "https://your-referral-service.example.com"

# Secrets — set via: wrangler secret put <NAME>
# POSTHOG_API_KEY =
# STRATUM_TELEMETRY_DISABLED = "true"  # uncomment to disable telemetry for self-hosted
# GITHUB_CLIENT_ID =
# GITHUB_CLIENT_SECRET =
# GOOGLE_CLIENT_ID =
# GOOGLE_CLIENT_SECRET =
# EMAIL_FROM_ADDRESS = "noreply@yourdomain.com"  # for magic link emails
# REFERRAL_SERVICE_SECRET =  # closed-beta gate shared secret (must match the referral service)

# =============================================================================
# [env.production] — the maintainer's hosted instance (app.usestratum.dev).
# Deploy with: wrangler deploy --env production
# Named environments do NOT inherit top-level bindings/vars/routes, so the real
# configuration is fully declared here.
# =============================================================================
[env.production]
name = "stratum"
# Keep the *.workers.dev URL enabled alongside the custom domain (wrangler
# disables it by default once `routes` is set). The deploy smoke tests hit it.
workers_dev = true

# Production custom domain. With custom_domain = true, Cloudflare provisions the
# DNS record + TLS cert for this hostname on deploy. workers.dev keeps working.
routes = [
  { pattern = "app.usestratum.dev", custom_domain = true }
]

[env.production.observability]
enabled = true
head_sampling_rate = 1.0

[env.production.observability.traces]
enabled = true
head_sampling_rate = 0.1

[[env.production.artifacts]]
binding = "ARTIFACTS"
namespace = "stratum-prod"

[[env.production.kv_namespaces]]
binding = "STATE"
id = "2285977f426647cf9e3db347cbc0f03b"

[[env.production.d1_databases]]
binding = "DB"
database_name = "stratum"
database_id = "de9b583b-d5f3-4868-a1eb-2208b76c7062"
migrations_dir = "migrations"

[[env.production.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "stratum_requests"

[[env.production.r2_buckets]]
binding = "BACKUPS"
bucket_name = "stratum-backups"

[env.production.ai]
binding = "AI"

[[env.production.durable_objects.bindings]]
name = "MERGE_QUEUE"
class_name = "MergeQueue"
script_name = "stratum"

[[env.production.durable_objects.bindings]]
name = "REPO_DO"
class_name = "RepoDO"
script_name = "stratum"

[[env.production.queues.producers]]
binding = "EVENTS_QUEUE"
queue = "stratum-events"

[[env.production.queues.producers]]
binding = "IMPORT_QUEUE"
queue = "stratum-imports"

[[env.production.queues.consumers]]
queue = "stratum-events"

[[env.production.queues.consumers]]
queue = "stratum-imports"
max_batch_size = 1
max_retries = 3
retry_delay = 30

[env.production.triggers]
crons = ["0 6 * * *", "*/5 * * * *"]

[[env.production.send_email]]
name = "EMAIL"

[env.production.vars]
POSTHOG_HOST = "https://app.posthog.com"
# The /dev-login session backdoor is local-only. Declare it "false" explicitly
# here (named envs don't inherit the top-level "true") so the route is provably
# inert in production — and so wrangler stops warning about the missing override.
DEV_LOGIN_ENABLED = "false"
# RepoDO fast-forward path (ADR 004); default off until staging numbers justify it.
REPO_DO_ENABLED = "false"
# Production OAuth callbacks. The matching callback URLs must also be registered
# in the GitHub and Google OAuth app settings.
OAUTH_REDIRECT_URI = "https://app.usestratum.dev/auth/github/callback"
GOOGLE_REDIRECT_URI = "https://app.usestratum.dev/auth/google/callback"
# Closed beta — invite code required at signup. The gate fails closed, so
# REFERRAL_SERVICE_URL must point at a LIVE referral service over a real public
# hostname: Worker->Worker subrequests over *.workers.dev are intermittently
# 404'd by the edge, so the referral service has its own custom domain
# (referral.usestratum.dev -> stratum-landing Worker). The apex usestratum.dev
# is still on the legacy Pages project; fold this into usestratum.dev after that
# cutover if desired.
# REFERRAL_SERVICE_SECRET is set out-of-band via `wrangler secret put` and must
# match the value on the stratum-landing Worker.
BETA_GATE = "1"
REFERRAL_SERVICE_URL = "https://referral.usestratum.dev"

# =============================================================================
# [env.staging]
# Deploy with: wrangler deploy --env staging
# =============================================================================
[env.staging]
name = "stratum-staging"
# Keep *.workers.dev enabled alongside the custom domain (the smoke tests use it).
workers_dev = true

# Staging custom domain (matches the staging OAuth callback host below).
routes = [
  { pattern = "staging.app.usestratum.dev", custom_domain = true }
]

# Observability for staging - full sampling for debugging
[env.staging.observability]
enabled = true
head_sampling_rate = 1.0

[env.staging.observability.traces]
enabled = true
head_sampling_rate = 1.0  # 100% sampling in staging for debugging

[[env.staging.artifacts]]
binding = "ARTIFACTS"
namespace = "stratum-staging"

[[env.staging.kv_namespaces]]
binding = "STATE"
id = "18a609aeddac442087de919a12677856"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "stratum-staging"
database_id = "85c63ac2-381e-4cd9-9c35-e89dad02df65"
migrations_dir = "migrations"

[[env.staging.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "stratum_requests"

[[env.staging.r2_buckets]]
binding = "BACKUPS"
bucket_name = "stratum-backups-staging"

[env.staging.ai]
binding = "AI"

[[env.staging.durable_objects.bindings]]
name = "MERGE_QUEUE"
class_name = "MergeQueue"
script_name = "stratum-staging"

[[env.staging.durable_objects.bindings]]
name = "REPO_DO"
class_name = "RepoDO"
script_name = "stratum-staging"

[[env.staging.r2_buckets]]
binding = "REPO_OBJECTS"
bucket_name = "stratum-repo-objects-staging"

[[env.staging.queues.producers]]
binding = "EVENTS_QUEUE"
queue = "stratum-events"

[[env.staging.queues.producers]]
binding = "IMPORT_QUEUE"
queue = "stratum-imports"

# Staging queue consumers for testing
# These are disabled by default to prevent staging from competing with production
# Enable when running integration tests: wrangler deploy --env=staging
# [[env.staging.queues.consumers]]
# queue = "stratum-events-staging"
#
# [[env.staging.queues.consumers]]
# queue = "stratum-imports-staging"
# max_batch_size = 1
# max_retries = 3
# retry_delay = 30

[[env.staging.send_email]]
name = "EMAIL"

[env.staging.vars]
POSTHOG_HOST = "https://app.posthog.com"
# Local-only session backdoor; explicitly off on staging (see env.production.vars).
DEV_LOGIN_ENABLED = "false"
# RepoDO + R2 merge path (ADR 004). "true" on staging: workspace commits stage to
# R2 and merges route through the fetch-free R2 path (cold path as fallback).
REPO_DO_ENABLED = "true"
OAUTH_REDIRECT_URI = "https://staging.app.usestratum.dev/auth/github/callback"
EMAIL_FROM_ADDRESS = "noreply@staging.app.usestratum.dev"
# Closed beta — validate the invite gate on staging before prod. Points at the
# live stratum-landing Worker (see [env.production.vars] cutover note).
BETA_GATE = "1"
REFERRAL_SERVICE_URL = "https://referral.usestratum.dev"
